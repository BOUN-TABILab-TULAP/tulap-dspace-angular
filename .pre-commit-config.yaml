# TULAP DSpace UI pre-commit hooks.
#
# One-time setup (per clone):
#   pip install pre-commit && pre-commit install
# Run against everything:
#   pre-commit run --all-files
#
# Scope is deliberately limited to fast, file-level checks. The heavy ESLint /
# build / tests run in CI (and locally via `npm run lint-fix`) — `ng lint` is
# project-wide and too slow to run on every commit.

repos:
  # --- Secrets: keep prod.env values and Handle/SSH private keys out of git ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- General hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=4096']
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
